services:
  neo4j:
    image: neo4j:5.16
    container_name: cloudspider-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: none
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build: .
    container_name: cloudspider-app
    ports:
      - "5000:5000"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      PYTHONUNBUFFERED: "1"
    volumes:
      - graph-snapshots:/app/snapshots

volumes:
  graph-snapshots:
